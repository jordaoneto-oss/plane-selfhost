services:
  addons-db:
    container_name: addons-db
    image: postgres:15-alpine
    restart: always
    volumes:
      - addons-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: addons
      POSTGRES_PASSWORD: addons
      POSTGRES_DB: addons
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U addons"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - plane_default

  authelia:
    container_name: authelia
    image: authelia/authelia:latest
    restart: always
    volumes:
      - ./authelia/config:/config
      - ./authelia/certs:/certs
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "9091:9091"
    depends_on:
      addons-db:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
    networks:
      - plane_default

  n8n:
