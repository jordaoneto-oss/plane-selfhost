      - ./n8n-data:/home/node/.n8n
    environment:
      N8N_PORT: 5678
      N8N_SECURE_COOKIE: "false"
      N8N_PROTOCOL: http
      N8N_HOST: 192.168.0.36:5678
      WEBHOOK_URL: http://192.168.0.36:5678
      DB_TYPE: sqlite
      DB_SQLITE_DATABASE: /home/node/.n8n/database.sqlite
