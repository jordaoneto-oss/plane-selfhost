services:
  web:
    container_name: web
    image: makeplane/plane-frontend:latest
    restart: always
    command: node /app/web/server.js
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${APP_BASE_URL}/api
      NEXT_PUBLIC_WEB_BASE_URL: ${APP_BASE_URL}
      NEXT_PUBLIC_ADMIN_BASE_URL: ${APP_BASE_URL}/god-mode
      NEXT_PUBLIC_ADMIN_BASE_PATH: /god-mode
      NEXT_PUBLIC_SPACE_BASE_URL: ${APP_BASE_URL}/spaces
      NEXT_PUBLIC_SPACE_BASE_PATH: /spaces
      NEXT_PUBLIC_LIVE_BASE_URL: ${APP_BASE_URL}/live
      NEXT_PUBLIC_LIVE_BASE_PATH: /live
    depends_on:
      - api

  admin:
    container_name: admin
    image: makeplane/plane-admin:latest
    restart: always
    command: node /app/admin/server.js
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${APP_BASE_URL}/api
      NEXT_PUBLIC_ADMIN_BASE_URL: ${APP_BASE_URL}/god-mode
      NEXT_PUBLIC_ADMIN_BASE_PATH: /god-mode
      NEXT_PUBLIC_WEB_BASE_URL: ${APP_BASE_URL}
    depends_on:
      - api
      - web

  space:
    container_name: space
    image: makeplane/plane-space:latest
    restart: always
    command: node /app/space/server.js
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${APP_BASE_URL}/api
      NEXT_PUBLIC_SPACE_BASE_URL: ${APP_BASE_URL}/spaces
      NEXT_PUBLIC_SPACE_BASE_PATH: /spaces
      NEXT_PUBLIC_WEB_BASE_URL: ${APP_BASE_URL}
    depends_on:
      - api
      - web

  api:
    container_name: api
    image: makeplane/plane-backend:latest
    restart: always
    command: ./bin/docker-entrypoint-api.sh
    env_file:
      - ./apps/api/.env
    depends_on:
      - plane-db
      - plane-redis

  worker:
    container_name: bgworker
    image: makeplane/plane-backend:latest
    restart: always
    command: ./bin/docker-entrypoint-worker.sh
    env_file:
      - ./apps/api/.env
    depends_on:
      - api
      - plane-db
      - plane-redis

  beat-worker:
    container_name: beatworker
    image: makeplane/plane-backend:latest
    restart: always
    command: ./bin/docker-entrypoint-beat.sh
    env_file:
      - ./apps/api/.env
    depends_on:
      - api
      - plane-db
      - plane-redis

  migrator:
    container_name: plane-migrator
    image: makeplane/plane-backend:latest
    restart: no
    command: ./bin/docker-entrypoint-migrator.sh
    env_file:
      - ./apps/api/.env
    depends_on:
      - plane-db
      - plane-redis

  live:
    container_name: plane-live
    image: makeplane/plane-live:latest
    restart: always
    command: node /app/live/dist/server.js
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${APP_BASE_URL}/api
      NEXT_PUBLIC_LIVE_BASE_URL: ${APP_BASE_URL}/live
      NEXT_PUBLIC_LIVE_BASE_PATH: /live
      NEXT_PUBLIC_WEB_BASE_URL: ${APP_BASE_URL}

  plane-db:
    container_name: plane-db
    image: postgres:15.7-alpine
    restart: always
    command: postgres -c 'max_connections=1000'
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data

  plane-redis:
    container_name: plane-redis
    image: valkey/valkey:7.2.11-alpine
    restart: always
    volumes:
      - redisdata:/data

  plane-mq:
    container_name: plane-mq
    image: rabbitmq:3.13.6-management-alpine
    restart: always
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit vm_memory_high_watermark 0.3"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  plane-minio:
    container_name: plane-minio
    image: minio/minio
    restart: always
    command: server /export --console-address ":9090"
    volumes:
      - uploads:/export
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}

  proxy:
    container_name: proxy
    image: makeplane/plane-proxy:latest
    restart: always
    ports:
      - ${LISTEN_HTTP_PORT}:80
      - ${LISTEN_HTTPS_PORT}:443
    environment:
      FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT:-5242880}
      BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-uploads}
    depends_on:
      - web
      - api
      - space
      - admin

volumes:
  pgdata:
  redisdata:
  uploads:
  rabbitmq_data:
